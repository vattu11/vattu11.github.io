<!DOCTYPE HTML>
<html>
<head>
    <link rel="icon" href="download.jpg">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Increment count when button is clicked</title>
</head>
  
<body style="text-align: center;>

  
    <h4>
        Kuinka monta kertoo nappia on painettu?
    </h4>
  
    <button id="btn">Paina!</button>
  
    <p>
        Nappia painettu <span 
        id="display">0</span> Times
    </p>
  
    <script type="text/javascript">
        var count = 0;
        var btn = document.getElementById("btn");
        var disp = document.getElementById("display");
  
        btn.onclick = function () {
            count++;
            disp.innerHTML = count;
        }
    </script>
<video src="Veigar penta.webm" type="video/webm">
</video>                                               
</body>
  
</html>
